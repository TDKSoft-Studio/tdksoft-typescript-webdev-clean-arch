apiVersion: architecture.tdk.io/v1
kind: Cell
metadata:
  name: CELL_ID
  namespace: appointment-system
spec:
  cellId: CELL_ID
  environment: dev
  capacity:
    maxRequestsPerSecond: 100
    maxConcurrentConnections: 50
  isolation:
    cpu: "500m"
    memory: "1Gi"
  routing:
    shardingKey: patient_id
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-CELL_ID
  namespace: appointment-system
  labels:
    app: appointment-service
    cell: CELL_ID
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
      cell: CELL_ID
  template:
    metadata:
      labels:
        app: appointment-service
        cell: CELL_ID
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
    spec:
      containers:
      - name: service
        image: appointment-service:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: CELL_ID
          value: CELL_ID
        - name: NODE_ENV
          value: "development"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-CELL_ID
  namespace: appointment-system
spec:
  selector:
    app: appointment-service
    cell: CELL_ID
  ports:
  - port: 3001
    targetPort: 3001
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-cell-headless
  namespace: appointment-system
spec:
  clusterIP: None
  selector:
    app: appointment-service
  ports:
  - port: 3001
    targetPort: 3001
