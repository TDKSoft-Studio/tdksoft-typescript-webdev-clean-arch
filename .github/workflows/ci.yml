name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd apps/appointment-svc
          npm ci
      
      - name: Type check
        run: |
          cd apps/appointment-svc
          npx tsc --noEmit
      
      - name: Build
        run: |
          cd apps/appointment-svc
          npm run build
      
      - name: Test Docker build
        run: |
          cd apps/appointment-svc
          docker build -f Dockerfile.dev -t test-appointment .
