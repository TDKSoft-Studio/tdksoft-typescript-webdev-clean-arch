name: Deploy to Production VPS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client
      
      - name: Setup kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes
      
      - name: Deploy cells
        run: |
          kubectl create namespace appointment-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f infrastructure/k8s/cells/crd/cell-crd.yaml || true
          
          for cell in cell-001 cell-002; do
            echo "Deploying $cell..."
            sed "s/CELL_ID/${cell}/g; s/CELL_ID_VALUE/${cell}/g" \
              infrastructure/k8s/cells/base/cell-dev.yaml | kubectl apply -f -
          done
          
          sleep 10
          kubectl wait --for=condition=ready pod -n appointment-system --all --timeout=120s || true
          kubectl get pods -n appointment-system
      
      - name: Health check
        run: |
          kubectl run health-check --image=curlimages/curl -it --rm --restart=Never \
            -n appointment-system -- curl -s http://appointment-cell-001:3001/health || true
      
      - name: Success
        run: echo "✅ Deployment completed successfully!"
