name: 🚀 Deploy to Production VPS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options:
          - production
          - staging
        default: production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appointment-service
  NAMESPACE: appointment-system

jobs:
  # Job 1: Validation
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd apps/appointment-svc
          npm ci

      - name: Type check
        run: |
          cd apps/appointment-svc
          npx tsc --noEmit

      - name: Build
        run: |
          cd apps/appointment-svc
          npm run build

  # Job 2: Build and push Docker image
  build:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/appointment-svc
          file: ./apps/appointment-svc/Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Deploy to VPS
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Cell CRD
        run: |
          kubectl apply -f infrastructure/k8s/cells/crd/cell-crd.yaml
          sleep 5

      - name: Deploy cells to production
        run: |
          for cell in cell-001 cell-002; do
            echo "Deploying $cell..."
            sed "s/CELL_ID/${cell}/g; s/CELL_ID_VALUE/${cell}/g" \
              infrastructure/k8s/cells/base/cell-dev.yaml | kubectl apply -f -
          done

      - name: Wait for deployments
        run: |
          sleep 10
          kubectl wait --for=condition=ready pod -n ${{ env.NAMESPACE }} --all --timeout=180s || true

      - name: Verify pods status
        run: |
          echo "=== Pods status ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide

      - name: Health check validation
        run: |
          echo "=== Health check ==="
          kubectl run health-check --image=curlimages/curl -i --rm --restart=Never \
            -n ${{ env.NAMESPACE }} -- curl -s http://appointment-cell-001:3001/health || true

      - name: Add deployment annotations
        run: |
          kubectl annotate deployment -n ${{ env.NAMESPACE }} --all \
            "app.tdk.com/deployed-at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "app.tdk.com/version=${{ github.ref_name }}" \
            "app.tdk.com/source=${{ github.repository }}"

  # Job 4: Notification
  notify:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment to production completed successfully!"
            echo "🎉 Version: ${{ github.ref_name }}"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
