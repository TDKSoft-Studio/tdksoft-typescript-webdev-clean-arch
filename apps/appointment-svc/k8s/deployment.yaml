apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: appointment-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
      - name: app
        image: appointment-service:dev
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: development
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@postgres:5432/appointment"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
